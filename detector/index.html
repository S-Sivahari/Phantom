<!DOCTYPE html>
<html>
<head>
  <title>Burstiness Detector</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
    textarea { width: 100%; height: 150px; padding: 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
    button { margin-top: 10px; padding: 10px 24px; background: #224797; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    #result { margin-top: 24px; }
    .score-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
    .score-num { font-size: 32px; font-weight: bold; }
    .verdict { font-size: 16px; margin-top: 4px; }
    .likely-ai { color: #dc2626; }
    .uncertain { color: #d97706; }
    .likely-human { color: #16a34a; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
    th { background: #f1f5f9; padding: 10px 14px; text-align: left; font-size: 13px; }
    td { padding: 10px 14px; font-size: 13px; border-top: 1px solid #f0f0f0; }
    .error { color: #dc2626; padding: 12px; background: #fef2f2; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>Burstiness Detector</h2>
  <p style="color:#666;font-size:14px">Paste any text below. High burstiness = human. Low = AI.</p>
  <textarea id="input" placeholder="Paste your text here..."></textarea>
  <br>
  <button onclick="analyze()">Analyze</button>

  <div id="result"></div>

  <script>
    async function analyze() {
      const text = document.getElementById('input').value.trim()
      if (!text) return

      document.getElementById('result').innerHTML = '<p style="color:#666">analyzing...</p>'

      const res = await fetch('http://127.0.0.1:8000/burstiness', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      })

      const data = await res.json()

      if (data.error) {
        document.getElementById('result').innerHTML = `<div class="error">${data.error}</div>`
        return
      }

      const verdictClass = data.verdict === 'likely AI' ? 'likely-ai' : data.verdict === 'uncertain' ? 'uncertain' : 'likely-human'

      let rows = data.sentences.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${data.lengths[i]} words</td>
          <td>${s.length > 60 ? s.slice(0, 60) + '...' : s}</td>
        </tr>
      `).join('')

      document.getElementById('result').innerHTML = `
        <div class="score-box">
          <div class="score-num">${data.score}</div>
          <div class="verdict ${verdictClass}">${data.verdict}</div>
        </div>
        <table>
          <thead><tr><th>#</th><th>Length</th><th>Sentence</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `
    }
  </script>
</body>
</html>
